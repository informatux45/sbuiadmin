; Raise PHP upload limits to match the app's own configured max upload size
; (Paramètres généraux > Taille max. autorisée pour l'upload des médias).
; Used under PHP-FPM/CGI, where .htaccess php_value directives (mod_php only)
; have no effect. Takes up to user_ini.cache_ttl seconds (default 300) to
; apply after being created or edited.
upload_max_filesize = 100M
post_max_size = 105M
