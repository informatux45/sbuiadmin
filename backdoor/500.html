<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Erreur 500</title>
	<script>
		(function () {
			try {
				var stored = localStorage.getItem('dash26-theme');
				var theme = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
			} catch (e) {
				document.documentElement.setAttribute('data-theme', 'light');
			}
		})();
	</script>
	<link href="assets/adminator/fonts/fonts.css" rel="stylesheet">
	<link href="assets/adminator/style.css" rel="stylesheet">
</head>
<body>
	<div class="error-shell">
		<div class="error-card">
			<span class="error-eyebrow">Erreur &middot; Serveur</span>
			<div class="error-code">500</div>
			<h1 class="error-title">Une erreur inattendue s'est produite</h1>
			<p class="error-sub">L'incident a été enregistré. Merci de réessayer dans un instant, ou de revenir à l'accueil.</p>
			<div class="error-actions">
				<a href="javascript:location.reload()" class="btn btn--primary">
					<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
					Réessayer
				</a>
				<a href="./" class="btn btn--ghost">
					<svg viewBox="0 0 24 24"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
					Accueil
				</a>
			</div>
			<!--ERROR_DETAILS_START-->
			<div class="alert danger" style="text-align:left;margin-top:20px">
				<span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg></span>
				<div class="body">
					<div class="title">Détail de l'erreur</div>
					<span class="mono" style="word-break:break-word">__ERROR_MESSAGE__</span>
				</div>
			</div>
			<!--ERROR_DETAILS_END-->
		</div>
	</div>
</body>
</html>
